name: Custom Docker

on:
  workflow_dispatch:
    inputs:
      platforms:
        description: Docker platforms to build
        required: true
        default: linux/amd64
      tag:
        description: Extra image tag
        required: true
        default: custom
  push:
    branches: [main]
    paths:
      - .github/workflows/custom-docker.yml
      - server/**
      - web/**
      - packages/**
      - i18n/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - .pnpmfile.cjs

concurrency:
  group: custom-docker-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/immich-server
  DEFAULT_PLATFORMS: linux/amd64

jobs:
  build-server:
    name: Build and Push Server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=custom
            type=ref,event=branch
            type=sha,prefix=commit-
            type=raw,value=${{ inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: server/Dockerfile
          platforms: ${{ inputs.platforms || env.DEFAULT_PLATFORMS }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_ID=${{ github.run_id }}
            BUILD_IMAGE=${{ env.IMAGE_NAME }}
            BUILD_SOURCE_REF=${{ github.ref_name }}
            BUILD_SOURCE_COMMIT=${{ github.sha }}
